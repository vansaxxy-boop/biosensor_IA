  <script>
    const foto = document.getElementById("foto");
    const preview = document.getElementById("preview");
    const resultadoBox = document.getElementById("resultado");

    foto.addEventListener("change", function () {
      const archivo = this.files[0];

      if (archivo) {
        preview.src = URL.createObjectURL(archivo);
        preview.style.display = "block";
      }
    });
function hablar(texto){

    speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(texto);

    const voces = speechSynthesis.getVoices();

    let vozElegida =
        voces.find(v=>v.lang.startsWith("es") &&
        v.name.toLowerCase().includes("female")) ||

        voces.find(v=>v.lang.startsWith("es"));

    if(vozElegida){
        msg.voice=vozElegida;
    }

    msg.lang="es-AR";
    msg.rate=1;
    msg.pitch=1;

    speechSynthesis.speak(msg);

}

function activarVoz(){

hablar("Bienvenido a Biosensor IA. Sistema inteligente para la detección de frescura de alimentos. Presione el botón comenzar análisis para iniciar.");

}
    
    }

    function analizar() {

      if (!preview.src) {
        alert("Primero cargá una imagen");
        return;
      }

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();

      img.onload = function () {

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        let r = 0, g = 0, b = 0;
        let total = data.length / 4;

        for (let i = 0; i < data.length; i += 4) {
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
        }

        r = r / total;
        g = g / total;
        b = b / total;

        let resultado = "";

        // 🟣 FRESCO (rosado-violeta)
        if (r > 120 && b > 120 && r > g) {
          resultado = "Fresco (rosado-violeta)";
        }

        // 🔵 INTERMEDIO (azul/celeste)
        else if (b > r && b > g) {
          resultado = "Intermedio (azul/celeste)";
        }

        // 🟡 RIESGO (amarillo/verdoso)
        else {
          resultado = "Riesgo (amarillo/verdoso)";
        }
let color="";
let mensaje="";
let voz="";

if(resultado.includes("Fresco")){

color="#9C27B0";

mensaje="🟣 ALIMENTO FRESCO<br><br>Color detectado: Violáceo / Rosáceo<br><br>Se recomienda conservar entre 0 y 4 grados Celsius.";

voz="Análisis finalizado. El biosensor indica que el alimento se encuentra fresco. Se recomienda conservarlo refrigerado entre cero y cuatro grados Celsius.";

}

else if(resultado.includes("Intermedio")){

color="#2196F3";

mensaje="🔵 ESTADO INTERMEDIO<br><br>Color detectado: Azulado<br><br>Consumir dentro de las próximas veinticuatro horas.";

voz="El biosensor detecta cambios iniciales en la frescura del alimento. Se recomienda consumirlo dentro de las próximas veinticuatro horas.";

}

else{

color="#8BC34A";

mensaje="🟡 RIESGO SANITARIO<br><br>Color detectado: Amarillo verdoso<br><br>No se recomienda consumir este alimento.";

voz="Atención. El biosensor detecta un estado avanzado de deterioro. Por seguridad alimentaria se recomienda no consumir este alimento.";

}

resultadoBox.style.background=color;
resultadoBox.style.color="white";
resultadoBox.style.padding="20px";
resultadoBox.style.borderRadius="20px";
resultadoBox.style.fontSize="25px";
resultadoBox.innerHTML=mensaje;

hablar(voz);
        
      };

      img.src = preview.src;
    }
  </script>
