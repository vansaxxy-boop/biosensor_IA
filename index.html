<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biosensor IA - AAR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

<div id="contenedor">

<div class="logo">
AAR
</div>

<h1>BIOSENSOR IA</h1>

<div class="subtitulo">

Sistema Inteligente para la Detección de Frescura de Alimentos

</div>

<div class="memoria">

AAR

<br>

Análisis • Alerta • Recomendación

</div>

<div class="frase">

La ciencia al servicio de la prevención y la vida.

</div>

<button id="inicio" onclick="mostrarControles()">

🧪 COMENZAR ANÁLISIS

</button>

<label id="btnFoto" for="foto" style="display:none;">

📷 CARGAR FOTOGRAFÍA DEL BIOSENSOR

</label>

<input
type="file"
id="foto"
accept="image/*"
capture="environment"
style="display:none;">

<img id="preview">

<button
id="btnVoz"
onclick="activarVoz()"
style="display:none;">

🎤 ACTIVAR ASISTENTE DE VOZ

</button>

<button
id="btnAnalizar"
onclick="analizar()"
style="display:none;">

🔬 ANALIZAR BIOSENSOR

</button>

<h2 id="resultado"></h2>

</div>
  

  <script>
    const foto = document.getElementById("foto");
    const preview = document.getElementById("preview");
    const resultadoBox = document.getElementById("resultado");

    foto.addEventListener("change", function () {
      const archivo = this.files[0];

      if (archivo) {
        preview.src = URL.createObjectURL(archivo);
        preview.style.display = "block";
      }
    });

    function activfunction mostrarControles(){

document.getElementById("inicio").style.display="none";

document.getElementById("btnFoto").style.display="inline-block";

document.getElementById("btnVoz").style.display="block";

document.getElementById("btnAnalizar").style.display="block";

}arVoz() {
      const msg = new SpeechSynthesisUtterance("Sistema de voz activado");

      msg.lang = "es-ES";
      msg.rate = 1;
      msg.volume = 1;

      speechSynthesis.cancel();
      speechSynthesis.speak(msg);
    }

    function analizar() {

      if (!preview.src) {
        alert("Primero cargá una imagen");
        return;
      }

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();

      img.onload = function () {

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        let r = 0, g = 0, b = 0;
        let total = data.length / 4;

        for (let i = 0; i < data.length; i += 4) {
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
        }

        r = r / total;
        g = g / total;
        b = b / total;

        let resultado = "";

        // 🟣 FRESCO (rosado-violeta)
        if (r > 120 && b > 120 && r > g) {
          resultado = "Fresco (rosado-violeta)";
        }

        // 🔵 INTERMEDIO (azul/celeste)
        else if (b > r && b > g) {
          resultado = "Intermedio (azul/celeste)";
        }

        // 🟡 RIESGO (amarillo/verdoso)
        else {
          resultado = "Riesgo (amarillo/verdoso)";
        }

        resultadoBox.innerText = "Resultado: " + resultado;

        speechSynthesis.speak(
          new SpeechSynthesisUtterance("Resultado " + resultado)
        );
      };

      img.src = preview.src;
    }
  </script>

</body>
</html>
