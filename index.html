<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biosensor Inteligente</title>
</head>

<body>

<h1>Biosensor Inteligente</h1>

<p>Seleccione una imagen del biosensor:</p>

<input type="file" id="foto" accept="image/*">

<br><br>

<img id="preview" width="300" style="display:none;">

<br><br>

<button onclick="analizar()">Analizar</button>

<h2 id="resultado"></h2>

<script>

const foto = document.getElementById("foto");
const preview = document.getElementById("preview");

foto.addEventListener("change", function() {
  const archivo = this.files[0];

  if (archivo) {
    preview.src = URL.createObjectURL(archivo);
    preview.style.display = "block";
  }
});

function analizar() {

  let color = prompt(
    "Ingrese el color observado: violeta, rosado o amarillo"
  );

  color = color.toLowerCase();

  let resultado = "";

  if (color === "violeta") {
    resultado = "Fresco";
  }
  else if (color === "rosado") {
    resultado = "Intermedio";
  }
  else if (color === "amarillo") {
    resultado = "Riesgo";
  }
  else {
    resultado = "Color no reconocido";
  }

  document.getElementById("resultado").innerHTML =
    "Resultado: " + resultado;

  let voz = new SpeechSynthesisUtterance(
    "Resultado " + resultado
  );

  speechSynthesis.speak(voz);
}

</script>

</body>
</html>
