<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Biosensor Inteligente</title>
<style>
body{
    background:#F57C00;
    font-family:Arial, sans-serif;
    text-align:center;
    color:white;
    margin:20px;
}
button{
    width:320px;
    height:70px;
    font-size:30px;
    font-weight:bold;
    border:none;
    border-radius:15px;
    margin:18px;
    cursor:pointer;
}

h1{
    font-size:40px;
}




input[type="file"]{
    font-size:20px;
    margin:15px;
}

#resultado{
    font-size:30px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="logo">
    <h1>AAR</h1>
    <h2>BIOSENSOR IA</h2>
    <p><b>Analizar • Alertar • Recomendar</b></p>
    <p>La ciencia al servicio de la prevención alimentaria.</p>
</div>

  <button onclick="activarVoz()">Activar voz</button>
  <br><br>

  <input type="file" id="foto" accept="image/*">
  <br><br>

  <img id="preview" width="200" style="display:none;">
  <br><br>

  <button onclick="analizar()">Analizar</button>

  <h2 id="resultado"></h2>

  <script>
    const foto = document.getElementById("foto");
    const preview = document.getElementById("preview");
    const resultadoBox = document.getElementById("resultado");

    foto.addEventListener("change", function () {
      const archivo = this.files[0];

      if (archivo) {
        preview.src = URL.createObjectURL(archivo);
        preview.style.display = "block";
      }
    });

    function activarVoz() {
      const msg = new SpeechSynthesisUtterance("Bienvenido a A A R. Biosensor Inteligente. Sistema listo para analizar su biosensor.");
      msg.lang = "es-ES";
      msg.rate = 1;
      msg.volume = 1;

      speechSynthesis.cancel();
      speechSynthesis.speak(msg);
    }

    function analizar() {

      if (!preview.src) {
        alert("Primero cargá una imagen");
        return;
      }

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();

      img.onload = function () {

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        let r = 0, g = 0, b = 0;
        let total = data.length / 4;

        for (let i = 0; i < data.length; i += 4) {
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
        }

        r = r / total;
        g = g / total;
        b = b / total;

        let resultado = "";

        // 🟣 FRESCO (rosado-violeta)
        if (r > 120 && b > 120 && r > g) {
          resultado = "Fresco (rosado-violeta)";
        }

        // 🔵 INTERMEDIO (azul/celeste)
        else if (b > r && b > g) {
          resultado = "Intermedio (azul/celeste)";
        }

        // 🟡 RIESGO (amarillo/verdoso)
        else {
          resultado = "Riesgo (amarillo/verdoso)";
        }

        resultadoBox.innerText = "Resultado: " + resultado;

        speechSynthesis.speak(
          new SpeechSynthesisUtterance("Resultado " + resultado)
        );
      };

      img.src = preview.src;
    }
  </script>

</body>
</html>
