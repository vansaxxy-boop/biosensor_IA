<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Biosensor IA - AAR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(135deg,#5E35B1,#7E57C2,#42A5F5);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:20px;

}

#contenedor{

background:white;

width:100%;

max-width:750px;

border-radius:30px;

padding:35px;

box-shadow:0 15px 40px rgba(0,0,0,.30);

text-align:center;

}

.logo{

width:150px;

height:150px;

margin:auto;

border-radius:50%;

background:linear-gradient(135deg,#8E24AA,#42A5F5,#9CCC65);

display:flex;

justify-content:center;

align-items:center;

font-size:58px;

font-weight:bold;

color:white;

box-shadow:0 0 25px rgba(0,0,0,.25);

}

h1{

margin-top:20px;

font-size:42px;

color:#512DA8;

}

.subtitulo{

margin-top:10px;

font-size:21px;

color:#444;

}

.memoria{

margin-top:18px;

font-size:20px;

font-style:italic;

color:#666;

}

.frase{

margin-top:12px;

font-size:18px;

color:#444;

margin-bottom:30px;

}

button{

width:100%;

padding:20px;

margin-top:15px;

font-size:24px;

border:none;

border-radius:18px;

cursor:pointer;

font-weight:bold;

transition:.3s;

}

button:hover{

transform:scale(1.03);

}

#btnVoz{

background:#29B6F6;

color:white;

}

#btnAnalizar{

background:#43A047;

color:white;

}

input[type=file]{

margin-top:25px;

font-size:20px;

width:100%;

}

#preview{

margin-top:25px;

max-width:100%;

border-radius:20px;

display:none;

border:5px solid #DDD;

}

#resultado{

margin-top:25px;

padding:20px;

font-size:28px;

font-weight:bold;

border-radius:20px;

}

</style>

</head>

<body>

  <h1>Biosensor Inteligente</h1>

  <button onclick="activarVoz()">Activar voz</button>
  <br><br>

  <input type="file" id="foto" accept="image/*">
  <br><br>

  <img id="preview" width="200" style="display:none;">
  <br><br>

  <button onclick="analizar()">Analizar</button>

  <h2 id="resultado"></h2>

  <script>
    const foto = document.getElementById("foto");
    const preview = document.getElementById("preview");
    const resultadoBox = document.getElementById("resultado");

    foto.addEventListener("change", function () {
      const archivo = this.files[0];

      if (archivo) {
        preview.src = URL.createObjectURL(archivo);
        preview.style.display = "block";
      }
    });

    function activarVoz() {
      const msg = new SpeechSynthesisUtterance("Sistema de voz activado");

      msg.lang = "es-ES";
      msg.rate = 1;
      msg.volume = 1;

      speechSynthesis.cancel();
      speechSynthesis.speak(msg);
    }

    function analizar() {

      if (!preview.src) {
        alert("Primero cargá una imagen");
        return;
      }

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const img = new Image();

      img.onload = function () {

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

        let r = 0, g = 0, b = 0;
        let total = data.length / 4;

        for (let i = 0; i < data.length; i += 4) {
          r += data[i];
          g += data[i + 1];
          b += data[i + 2];
        }

        r = r / total;
        g = g / total;
        b = b / total;

        let resultado = "";

        // 🟣 FRESCO (rosado-violeta)
        if (r > 120 && b > 120 && r > g) {
          resultado = "Fresco (rosado-violeta)";
        }

        // 🔵 INTERMEDIO (azul/celeste)
        else if (b > r && b > g) {
          resultado = "Intermedio (azul/celeste)";
        }

        // 🟡 RIESGO (amarillo/verdoso)
        else {
          resultado = "Riesgo (amarillo/verdoso)";
        }

        resultadoBox.innerText = "Resultado: " + resultado;

        speechSynthesis.speak(
          new SpeechSynthesisUtterance("Resultado " + resultado)
        );
      };

      img.src = preview.src;
    }
  </script>

</body>
</html>
