<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AAR BIOSENSOR IA</title>

<style>

body{

margin:0;

font-family:Arial,Helvetica,sans-serif;

background:linear-gradient(135deg,#5E35B1,#42A5F5);

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

#contenedor{

width:90%;

max-width:650px;

background:white;

padding:30px;

border-radius:25px;

text-align:center;

box-shadow:0 10px 30px rgba(0,0,0,.30);

}

.logo{

width:120px;

height:120px;

margin:auto;

border-radius:50%;

background:#5E35B1;

color:white;

font-size:42px;

font-weight:bold;

display:flex;

justify-content:center;

align-items:center;

}

h1{

color:#5E35B1;

margin-top:20px;

}

.subtitulo{

font-size:20px;

margin-top:10px;

color:#444;

}

.memoria{

font-size:18px;

margin-top:20px;

font-weight:bold;

color:#5E35B1;

}

.frase{

margin-top:10px;

font-style:italic;

color:#666;

}

button,label{

display:block;

width:100%;

margin-top:20px;

padding:18px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:15px;

cursor:pointer;

color:white;

}

#inicio{background:#5E35B1;}

#btnFoto{background:#FB8C00;display:none;}

#btnVoz{background:#1976D2;display:none;}

#btnAnalizar{background:#43A047;display:none;}

#foto{display:none;}

#preview{

display:none;

width:100%;

margin-top:20px;

border-radius:20px;

}

#resultado{

display:none;

margin-top:25px;

padding:20px;

border-radius:20px;

font-size:24px;

font-weight:bold;

color:white;

}

</style>

</head>

<body><div id="contenedor">

<div class="logo">
AAR
</div>

<h1>BIOSENSOR IA</h1>

<div class="subtitulo">
Sistema Inteligente para la Detección de Frescura de Alimentos
</div>

<div class="memoria">
<strong>AAR</strong><br>
Análisis • Alerta • Recomendación
</div>

<div class="frase">
Tecnología e inteligencia artificial para una alimentación más segura.
</div>

<button id="inicio" onclick="mostrarControles()">
🧪 COMENZAR ANÁLISIS
</button>

<label id="btnFoto" for="foto">
📷 CARGAR FOTOGRAFÍA DEL BIOSENSOR
</label>

<input
type="file"
id="foto"
accept="image/*"
capture="environment">

<img id="preview">

<button id="btnVoz" onclick="activarVoz()">
🎤 ACTIVAR ASISTENTE DE VOZ
</button>

<button id="btnAnalizar" onclick="analizar()">
🔬 ANALIZAR BIOSENSOR
</button>

<h2 id="resultado"></h2>

</div>

<script>const foto=document.getElementById("foto");
const preview=document.getElementById("preview");
const resultadoBox=document.getElementById("resultado");

function mostrarControles(){

document.getElementById("inicio").style.display="none";
document.getElementById("btnFoto").style.display="block";
document.getElementById("btnVoz").style.display="block";
document.getElementById("btnAnalizar").style.display="block";

}

foto.addEventListener("change",function(){

const archivo=this.files[0];

if(archivo){

preview.src=URL.createObjectURL(archivo);
preview.style.display="block";

}

});

function hablar(texto){

speechSynthesis.cancel();

const msg=new SpeechSynthesisUtterance(texto);

msg.lang="es-AR";
msg.rate=1;
msg.pitch=1;

const voces=speechSynthesis.getVoices();

const voz=voces.find(v=>v.lang.startsWith("es"));

if(voz){

msg.voice=voz;

}

speechSynthesis.speak(msg);

}

function activarVoz(){

hablar("Bienvenido a A A R Biosensor I A. Sistema inteligente para el análisis, alerta y recomendación sobre la frescura de alimentos.");

}
