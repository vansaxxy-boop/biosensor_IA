<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biosensor Inteligente</title>
</head>

<body>

<h1>Biosensor Inteligente</h1>

<p>Seleccione una imagen del biosensor:</p>

<input type="file" id="foto" accept="image/*">

<br><br>

<img id="preview" width="300" style="display:none;">

<br><br>

<button onclick="analizar()">Analizar</button>

<h2 id="resultado"></h2>
<script>
const foto = document.getElementById("foto");
const preview = document.getElementById("preview");

foto.addEventListener("change", function () {
  const archivo = this.files[0];

  if (archivo) {
    preview.src = URL.createObjectURL(archivo);
    preview.style.display = "block";
  }
});
function analizar() {
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = preview.src;

  img.onload = function () {
    canvas.width = img.width;
    canvas.height = img.height;

    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    let r = 0, g = 0, b = 0;
    let count = data.length / 4;

    for (let i = 0; i < data.length; i += 4) {
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
    }

    r = r / count;
    g = g / count;
    b = b / count;

    let resultado = "";

    if (b > r && b > g) {
      resultado = "Fresco (Violeta dominante)";
    } else if (r > b && g < 150) {
      resultado = "Intermedio (Rosado dominante)";
    } else {
      resultado = "Riesgo (Amarillo o degradado)";
    }

    document.getElementById("resultado").innerText =
      "Resultado: " + resultado;

    speechSynthesis.speak(
      new SpeechSynthesisUtterance("Resultado " + resultado)
    );
  };
}

</script>


</body>
</html>
